# GemiX sandbox - reference topology.
#
# This file is NOT used in production (the Node `buildSandbox` spawns
# containers programmatically). It exists to:
#   1. Let you verify the image + proxy work on your Linux server:
#        docker compose -f sandbox/docker-compose.yml up --build
#   2. Document the exact network topology / mounts / limits the manager
#      will reproduce at runtime.
#
# Production notes:
#   - The manager creates ONE sandbox container per active workspaceId
#     (group:<id> or user:<storageId>) and reuses it for the session.
#   - The proxy is a singleton: one instance shared by all sandboxes.
#   - Volumes are mounted per-container by the manager (not statically).

services:
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    image: gemix-sandbox-proxy:latest
    container_name: gemix-sandbox-proxy
    restart: unless-stopped
    # Forwards ALL sandbox egress upstream to the residential SOCKS5
    # (tailsocks -> Redmi). No allowlist. Fail-closed when the Redmi is off.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROXY_PORT: "8080"
      # Residential SOCKS5 upstream reachable from this container.
      REDMI_SOCKS_HOST: "${REDMI_SOCKS_HOST:-host.docker.internal}"
      REDMI_SOCKS_PORT: "${REDMI_SOCKS_PORT:-5040}"
      # URL of the host's internal notify server - set to reach the Node process.
      # On Linux Docker: http://172.17.0.1:9999/notify
      # On Docker Desktop: http://host.docker.internal:9999/notify
      GEMIX_NOTIFY_URL: "${GEMIX_NOTIFY_URL:-}"
      GEMIX_NOTIFY_SECRET: "${GEMIX_NOTIFY_SECRET:-}"
    networks:
      egress: {}           # path to the host (reaches tailsocks); upstream is SOCKS5
      sandbox_net: {}      # reachable by sandboxes as hostname "gemix-sandbox-proxy"
    # Do NOT expose the port to the host - the proxy must only be reachable
    # from sandbox_net.

  sandbox_example:
    # Example of how the Node manager will run a sandbox. The manager always
    # overrides Entrypoint to skip the legacy Jupyter bootstrap and runs the
    # container as a quiet `sleep infinity` process attached via `docker exec`.
    build:
      context: .
      dockerfile: Dockerfile
    image: gemix-sandbox:latest
    container_name: gemix-sandbox-example
    depends_on: [proxy]
    entrypoint: ""
    command: ["sleep", "infinity"]
    user: "1000:1000"
    environment:
      HTTP_PROXY:  "http://gemix-sandbox-proxy:8080"
      HTTPS_PROXY: "http://gemix-sandbox-proxy:8080"
      http_proxy:  "http://gemix-sandbox-proxy:8080"
      https_proxy: "http://gemix-sandbox-proxy:8080"
      NO_PROXY:    "localhost,127.0.0.1"
      GEMIX_BUILD: "1"
    networks:
      sandbox_net: {}      # no default internet; only the proxy is reachable
    read_only: false       # /workspace must be writable
    tmpfs:
      - /tmp:size=256m
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 200
    mem_limit: 1536m
    memswap_limit: 1536m
    cpus: 1.0
    volumes:
      # Mount a real build workspace here in tests:
      # Skills mount (read-only):
      - ../src/data/skills:/skills:ro

networks:
  # Internal-only network where sandboxes live; no direct internet.
  sandbox_net:
    driver: bridge
    internal: true
  # Network with internet access, used only by the proxy.
  egress:
    driver: bridge
